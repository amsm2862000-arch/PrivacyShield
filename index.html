<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whale Rescue: From Rubble to Code</title>
    <style>
        body { margin: 0; padding: 0; background: #0d1117; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; text-align: center; direction: rtl; }
        .container { max-width: 450px; margin: 0 auto; padding: 10px; }
        h2 { margin: 5px 0; font-size: 1.2rem; color: #58a6ff; }
        canvas { background: #161b22; display: block; margin: 10px auto; border: 2px solid #3fb950; border-radius: 8px; width: 100%; max-height: 55vh; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .score-board { font-size: 1.1rem; margin-bottom: 5px; background: #21262d; padding: 8px; border-radius: 6px; }
        .whale-marquee { background: #1f242c; padding: 10px; border-radius: 6px; border-right: 4px solid #ff7b72; text-align: right; font-size: 0.9rem; }
        .donate-btn { display: inline-block; background: #238636; color: white; text-decoration: none; padding: 10px 20px; margin-top: 10px; border-radius: 6px; font-weight: bold; width: 85%; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎮 لعبة إنقاذ المطور (Whale Rescue)</h2>
    <div class="score-board">النقاط: <span id="score" style="color: #3fb950; font-weight: bold;">0</span> | الهدف: <span style="color: #ff7b72; font-weight: bold;">50k$</span></div>
    <canvas id="gameCanvas" width="400" height="450"></canvas>
    <div class="whale-marquee">
        <strong>🐳 لوحة شرف كبار الداعمين (الحيتان):</strong>
        <div id="whaleList" style="margin-top: 5px; color: #58a6ff; font-weight: bold;"></div>
    </div>
    <a href="https://giveth.io" target="_blank" class="donate-btn">🚀 ادعم الحملة لتسجيل اسمك هنا</a>
</div>
<script>
    const WHALE_DONORS = ["VIP_Whale_1 🐳", "Crypto_King_👑", "Yolo_Boss_🔥", "الداعم_الأول_✨"];
    document.getElementById("whaleList").innerHTML = WHALE_DONORS.join(" | ");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    let score = 0;
    let player = { x: 160, y: 410, width: 80, height: 15 };
    let item = { x: Math.random() * 360, y: 0, size: 24, speed: 4 };
    let currentWhaleIndex = 0;
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width; 
        let touchX = (e.touches.clientX - rect.left) * scaleX;
        player.x = touchX - player.width / 2;
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    }, { passive: false });
    function update() {
        item.y += item.speed;
        if (item.y + item.size >= player.y && item.x >= player.x - 10 && item.x <= player.x + player.width + 10) {
            score += 10; scoreEl.innerText = score;
            currentWhaleIndex = (currentWhaleIndex + 1) % WHALE_DONORS.length; resetItem();
        }
        if (item.y > canvas.height) { resetItem(); }
    }
    function resetItem() { item.x = Math.random() * (canvas.width - 30) + 15; item.y = 0; item.speed = 4 + (score * 0.05); }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#58a6ff"; ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = "#ffffff"; ctx.font = "10px sans-serif"; ctx.fillText("DEV WORKSTATION", player.x + 5, player.y + 11);
        ctx.font = "24px sans-serif"; ctx.fillText("🛡️", item.x, item.y);
        ctx.font = "12px sans-serif"; ctx.fillStyle = "#ff7b72"; ctx.fillText(WHALE_DONORS[currentWhaleIndex], item.x - 20, item.y - 30);
    }
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
  </html>
